server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers — kept in sync with netlify.toml [[headers]] for /*
  # Note: HSTS is omitted here because this container is HTTP-only (Docker dev/local).
  # X-XSS-Protection is intentionally absent (deprecated; browsers have removed their XSS auditor).
  add_header X-Content-Type-Options    "nosniff"                          always;
  add_header X-Frame-Options           "DENY"                             always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
  # 'unsafe-inline' is required by Angular component runtime styles and the DOM-built
  # global error overlay; script-src remains strict ('self' only) to keep XSS protection.
  add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https://*.netlify.app https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https://*.netlify.app https://*.netlify.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; manifest-src 'self'; worker-src 'self'" always;

  # API → Netlify serverless functions.
  # Mirrors the netlify.toml wildcard redirect:
  #   from = "/api/*"  to = "/.netlify/functions/:splat"
  # Requests reach the live Netlify deployment which applies its own redirect rules.
  location /api/ {
    proxy_http_version 1.1;
    proxy_pass         https://llm-prompt-purify.netlify.app;
    proxy_set_header   Host              llm-prompt-purify.netlify.app;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Real-IP         $remote_addr;
  }

  # SPA fallback — all non-asset paths serve index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
