<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Mock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.2rem; font-weight: 600; color: #4f9cf7; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 50rem;
      margin: 0 auto;
      padding: 1.5rem;
      width: 100%;
    }
    .messages { flex: 1; overflow-y: auto; }
    .message { padding: 1rem; margin-bottom: 0.5rem; border-radius: 0.75rem; }
    .message.assistant { background: rgba(255,255,255,0.05); }
    .input-container {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }
    /*
      Content script selectors for DeepSeek:
        #chat-input
        [data-testid="chat-input"]
    */
    #chat-input {
      flex: 1;
      min-height: 48px;
      background: transparent;
      border: none;
      color: #e6edf3;
      font-size: 1rem;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.35); }
    .send-btn {
      background: #4f9cf7;
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <header class="header">
    <h1>DeepSeek Mock</h1>
    <span>Test Environment</span>
  </header>

  <main class="main">
    <div class="messages">
      <div class="message assistant">
        <p>Hello! I'm DeepSeek. How can I help you?</p>
      </div>
    </div>

    <div class="input-container">
      <textarea
        id="chat-input"
        data-testid="chat-input"
        placeholder="Send a message..."
        aria-label="Send a message"
        rows="2"
      ></textarea>
      <button class="send-btn" type="button" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </main>

  <script>
    const input = document.getElementById('chat-input');

    const testPrompts = [
      'Here is my database password: root_admin_P@ss2024!',
      'IBAN: DE89370400440532013000 for wire transfer',
      'My social security number is 078-05-1120',
      'Slack webhook: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX',
      'IP address of prod server: 192.168.1.100, SSH port 22',
    ];

    window.testPrompts = testPrompts;
    window.setPromptText = function(text) {
      input.value = text;
      input.dispatchEvent(new Event('input', { bubbles: true }));
    };
    window.getPromptText = function() {
      return input.value;
    };
  </script>
</body>
</html>
