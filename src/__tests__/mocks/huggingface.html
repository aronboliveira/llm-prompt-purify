<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HuggingFace Chat Mock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.2rem; font-weight: 600; color: #ff9d00; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 50rem;
      margin: 0 auto;
      padding: 1.5rem;
      width: 100%;
    }
    .messages { flex: 1; overflow-y: auto; }
    .message { padding: 1rem; margin-bottom: 0.5rem; border-radius: 0.75rem; }
    .message.assistant { background: rgba(255,255,255,0.05); }
    .input-container {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 1.5rem;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }
    /*
      Content script selector for HuggingFace Chat:
        textarea[placeholder*="Ask"]
      Live page (huggingface.co/chat) real element:
        <textarea placeholder="Ask anything" rows="1">
    */
    .chat-input {
      flex: 1;
      min-height: 40px;
      background: transparent;
      border: none;
      color: #f3f4f6;
      font-size: 1rem;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    .chat-input::placeholder { color: rgba(255,255,255,0.4); }
    .send-btn {
      background: #ff9d00;
      color: #111;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <header class="header">
    <h1>HuggingFace Chat Mock</h1>
    <span>Test Environment</span>
  </header>

  <main class="main">
    <div class="messages">
      <div class="message assistant">
        <p>Hi! I'm a HuggingFace assistant. Ask me anything.</p>
      </div>
    </div>

    <div class="input-container">
      <textarea
        class="chat-input"
        placeholder="Ask anything"
        aria-label="Ask anything"
        rows="1"
      ></textarea>
      <button class="send-btn" type="button" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </main>

  <script>
    const input = document.querySelector('textarea[placeholder*="Ask"]');

    const testPrompts = [
      'My HuggingFace token: hf_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789',
      'Encrypt with AES key: 2b7e151628aed2a6abf7158809cf4f3c',
      'Patient John Smith, MRN: 12345678, DOB: 1990-06-15, diagnosis: diabetes',
      'Twilio SID: AC1234567890abcdef1234567890abcde\x66, Auth: abcdef123456',
      'Passport: US E12345678, visa expiry 2025-12-01, nationality Brazilian',
    ];

    window.testPrompts = testPrompts;
    window.setPromptText = function(text) {
      input.value = text;
      input.dispatchEvent(new Event('input', { bubbles: true }));
    };
    window.getPromptText = function() {
      return input.value;
    };
  </script>
</body>
</html>
