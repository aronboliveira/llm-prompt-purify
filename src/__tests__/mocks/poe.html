<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poe Mock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #232136;
      color: #e0def4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.2rem; font-weight: 600; color: #6c63ff; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 50rem;
      margin: 0 auto;
      padding: 1.5rem;
      width: 100%;
    }
    .messages { flex: 1; overflow-y: auto; }
    .message { padding: 1rem; margin-bottom: 0.5rem; border-radius: 0.75rem; }
    .message.bot { background: rgba(255,255,255,0.05); }
    .ChatMessageInputContainer {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }
    /*
      Content script selectors for Poe:
        textarea[class*="ChatInput"]
        [class*="ChatMessageInputContainer"] textarea
    */
    .ChatInput_textArea {
      flex: 1;
      min-height: 48px;
      background: transparent;
      border: none;
      color: #e0def4;
      font-size: 1rem;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    .ChatInput_textArea::placeholder { color: rgba(255,255,255,0.35); }
    .send-btn {
      background: #6c63ff;
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <header class="header">
    <h1>Poe Mock</h1>
    <span>Test Environment</span>
  </header>

  <main class="main">
    <div class="messages">
      <div class="message bot">
        <p>Hello! Choose a bot or start chatting.</p>
      </div>
    </div>

    <div class="ChatMessageInputContainer">
      <textarea
        class="ChatInput_textArea"
        placeholder="Talk to Assistant..."
        aria-label="Message"
        rows="2"
      ></textarea>
      <button class="send-btn" type="button" aria-label="Send message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </main>

  <script>
    const input = document.querySelector('textarea[class*="ChatInput"]');

    const testPrompts = [
      'AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY',
      'My credit card: 5555-5555-5555-4444 exp 12/26 CVV 123',
      'MySQL: mysql://root:admin123@db.prod.internal:3306/users',
      'Please email the contract to ceo@acmecorp.com and legal@acmecorp.com',
      'Bearer token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkw...',
    ];

    window.testPrompts = testPrompts;
    window.setPromptText = function(text) {
      input.value = text;
      input.dispatchEvent(new Event('input', { bubbles: true }));
    };
    window.getPromptText = function() {
      return input.value;
    };
  </script>
</body>
</html>
