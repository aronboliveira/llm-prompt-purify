<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock ChatGPT Interface</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #343541;
        color: #ececf1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        padding: 1rem;
        border-bottom: 1px solid #4d4d4f;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header h1 {
        font-size: 1.2rem;
        font-weight: 500;
      }
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 48rem;
        margin: 0 auto;
        padding: 1rem;
        width: 100%;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
      }
      .message {
        padding: 1rem;
        margin-bottom: 0.5rem;
        border-radius: 0.5rem;
      }
      .message.user {
        background: #444654;
      }
      .message.assistant {
        background: transparent;
      }
      .input-area {
        padding: 1rem;
        background: #40414f;
        border-radius: 0.75rem;
        margin-top: auto;
      }
      .prompt-textarea {
        width: 100%;
        min-height: 100px;
        background: transparent;
        border: none;
        color: #ececf1;
        font-size: 1rem;
        resize: none;
        outline: none;
        font-family: inherit;
      }
      .prompt-textarea::placeholder {
        color: #8e8ea0;
      }
      .send-btn {
        background: #19c37d;
        color: #fff;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      .send-btn:hover {
        background: #1a7f5a;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>ChatGPT Mock</h1>
      <span>Test Environment</span>
    </header>

    <main class="main">
      <div class="messages">
        <div class="message assistant">
          <p>Hello! How can I assist you today?</p>
        </div>
      </div>

      <div class="input-area">
        <textarea
          id="prompt-textarea"
          class="prompt-textarea"
          placeholder="Message ChatGPT..."
          data-testid="prompt-textarea"
          aria-label="Message ChatGPT"
          rows="4"
        ></textarea>
        <button class="send-btn" type="button" aria-label="Send message">
          Send
        </button>
      </div>
    </main>

    <script>
      // Simulate contenteditable behavior for testing
      const textarea = document.getElementById("prompt-textarea");

      // Pre-fill with test data containing sensitive information
      const testPrompts = [
        "My email is john.doe@company.com and my phone is 555-123-4567",
        "I live at 123 Main Street, Apt 4B, New York, NY 10001",
        "My SSN is 123-45-6789 and my credit card is 4111-1111-1111-1111",
        "My API key is sk-abc123def456ghi789jkl012mno345pqr678",
        "Bearer token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U",
      ];

      // Expose test data for automated tests
      window.testPrompts = testPrompts;
      window.setPromptText = function (text) {
        textarea.value = text;
        textarea.dispatchEvent(new Event("input", { bubbles: true }));
      };
      window.getPromptText = function () {
        return textarea.value;
      };
    </script>
  </body>
</html>
