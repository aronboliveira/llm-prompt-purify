<section class="pane pane--raw">
  <div class="pane__header">
    <div class="pane__title-wrap">
      <h2>{{ title() }}</h2>
      <button
        aria-label="Help"
        class="help-trigger"
        type="button"
        (click)="requestHelp()"
      >
        <span
          aria-hidden="true"
          class="help-trigger__icon"
          [innerHTML]="icons.help"
        ></span>
      </button>
    </div>
    <span class="char-count">{{ sourceText().length }} chars</span>
  </div>

  <p class="pane__body">{{ body() }}</p>

  <div class="pane__toolbar">
    <button
      aria-label="Load a .txt or .log file into the prompt"
      class="load-file-trigger"
      data-testid="load-file-trigger"
      type="button"
      (click)="triggerFileLoad()"
    >
      <span
        aria-hidden="true"
        class="load-file-trigger__icon"
        [innerHTML]="icons.upload"
      ></span>
      <span class="load-file-trigger__label">Load .txt / .log</span>
    </button>
    <input
      #fileInput
      aria-hidden="true"
      class="load-file-input"
      data-testid="load-file-input"
      tabindex="-1"
      type="file"
      [accept]="fileAccept"
      (change)="onFileSelected($event)"
    />
  </div>

  <label class="sr-only" for="sourceText">Raw version</label>
  <textarea
    id="sourceText"
    class="editor"
    data-testid="source-textarea"
    [ngModel]="sourceText()"
    (input)="onInput($event)"
    (paste)="onPaste($event)"
    (ngModelChange)="updateSourceText($event)"
    [placeholder]="placeholder()"
    spellcheck="false"
  ></textarea>
</section>
