<section class="scanner-toolbar">
  <div class="scanner-toolbar__actions">
    <button
      class="scanner-toolbar__button scanner-toolbar__button--scope"
      data-testid="country-modal-button"
      type="button"
      (click)="openCountryModal()"
    >
      <span class="scanner-toolbar__button-label">Countries</span>
      <span class="scanner-toolbar__button-value">{{ countrySummary() }}</span>
    </button>

    <button
      class="scanner-toolbar__button scanner-toolbar__button--settings"
      data-testid="settings-button"
      type="button"
      (click)="openSettingsModal()"
    >
      <span
        aria-hidden="true"
        class="scanner-toolbar__icon"
        [innerHTML]="settingsIcon()"
      ></span>
      <span>Masking settings</span>
    </button>
  </div>

  <p class="scanner-toolbar__summary">{{ scopeDescription() }}</p>

  @if (showWarning() && warning()) {
    <details class="scanner-toolbar__warning">
      <summary class="scanner-toolbar__warning-summary">
        <span aria-hidden="true">⚠️</span>
        <span>Language scope warning</span>
      </summary>
      <p class="scanner-toolbar__warning-body">{{ warning() }}</p>
    </details>
  }
</section>
