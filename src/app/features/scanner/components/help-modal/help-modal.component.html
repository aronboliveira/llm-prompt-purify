@if (topic(); as activeTopic) {
  <div
    class="help-modal-backdrop"
    role="presentation"
    (click)="closeOnBackdrop($event)"
  >
    <section
      aria-labelledby="help-modal-title"
      aria-modal="true"
      class="help-modal"
      role="dialog"
    >
      <header class="help-modal__header">
        <div class="help-modal__title-wrap">
          <span aria-hidden="true" class="help-modal__icon" [innerHTML]="icons.help"></span>
          <h2 id="help-modal-title">{{ activeTopic.title }}</h2>
        </div>
        <button
          aria-label="Close help"
          class="help-modal__close"
          type="button"
          (click)="close()"
        >
          Close
        </button>
      </header>

      <div class="help-modal__body">
        @for (paragraph of activeTopic.paragraphs; track paragraph) {
          <p>{{ paragraph }}</p>
        }
      </div>
    </section>
  </div>
}
