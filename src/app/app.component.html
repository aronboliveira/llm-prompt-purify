<div
  class="app-shell"
  [attr.data-language-risk]="hasMixedLanguageSelection()"
  [attr.data-state]="
    vm().isScanning ? 'scanning' : vm().hasResult ? 'ready' : 'idle'
  "
  [style.--selected-country-count]="vm().selectedCountryProfiles.length"
>
  <app-feedback-sheet></app-feedback-sheet>

  <app-product-header
    [title]="'LLM Prompt Purifier'"
    [tagline]="'Client-side prompt protection'"
  ></app-product-header>

  <app-hero-section
    [body]="copy.heroBody"
    [noticeIcon]="icons.privacy"
    [noticeTitle]="copy.clientsideTitle"
    [noticeBody]="copy.clientsideBody"
    (helpRequested)="openHelp('clientside')"
  ></app-hero-section>

  <app-workflow-strip
    [snippets]="workflowSnippets"
    [stateResolver]="snippetState.bind(this)"
    [footerText]="copy.heroTitle"
  ></app-workflow-strip>

  <app-scanner-toolbar
    [countrySummary]="selectedCountrySummary()"
    [scopeDescription]="scopeCopy()"
    [settingsIcon]="icons.settings"
    [warning]="copy.languageWarning"
    [showWarning]="
      hasMixedLanguageSelection() && vm().detectionMode !== 'global-only'
    "
    (countryModalRequested)="openCountryModal()"
    (settingsModalRequested)="openSettingsModal()"
  ></app-scanner-toolbar>

  <main class="translator">
    <app-raw-prompt-pane
      [title]="copy.rawTitle"
      [body]="copy.rawBody"
      [sourceText]="vm().sourceText"
      (helpRequested)="openHelp('workflow')"
      (sourceTextChanged)="
        updateSourceText($event.value, $event.inputType, $event.isComposing)
      "
    ></app-raw-prompt-pane>

    <div class="translator__bridge" aria-hidden="true">
      <span>Raw version</span>
      <strong>⇄</strong>
      <span>Masked version</span>
    </div>

    <app-masked-output-pane
      [title]="copy.outputTitle"
      [body]="copy.outputBody"
      [maskedText]="vm().maskedText"
      [emptyPlaceholder]="copy.emptyOutput"
      [statusMessage]="vm().statusMessage"
      [detectionModeLabel]="detectionModeCopy()"
      [statusTone]="statusTone()"
      [copyIcon]="icons.copy"
      [helpIcon]="icons.help"
      [refreshIcon]="icons.refresh"
      [isScanning]="vm().isScanning"
      [hasResult]="vm().hasResult"
      [canCopy]="vm().canCopy"
      [hasMatches]="vm().matches.length > 0"
      [hasSourceText]="!!vm().sourceText"
      (helpRequested)="openHelp('coverage')"
      (copyRequested)="copyMaskedOutput()"
      (regenerateRequested)="regenerateAllMasks()"
      (clearRequested)="clear()"
    ></app-masked-output-pane>
  </main>

  <app-controls-panel
    [title]="copy.controlsTitle"
    [body]="copy.controlsBody"
    [groups]="vm().groups"
    [matches]="vm().matches"
    (helpRequested)="openHelp('controls')"
    (groupAlwaysOnToggled)="toggleGroupAlwaysOn($event)"
    (groupEnabledToggled)="toggleGroupEnabled($event)"
    (matchRegenerated)="regenerateMatch($event)"
    (matchToggled)="toggleMatch($event)"
  ></app-controls-panel>

  <app-country-scope-modal
    [countryProfiles]="vm().countryProfiles"
    [isOpen]="isCountryModalOpen()"
    [mixedLanguageWarning]="hasMixedLanguageSelection()"
    [selectedLanguageSummary]="selectedLanguageSummary()"
    (closed)="closeCountryModal()"
    (countryToggled)="toggleCountryProfile($event)"
    (helpRequested)="openHelp('country')"
  ></app-country-scope-modal>

  <app-masking-settings-modal
    [advancedPreferences]="vm().advancedPreferences"
    [detectionMode]="vm().detectionMode"
    [groupPreferences]="vm().groupPreferences"
    [isOpen]="isSettingsModalOpen()"
    (closed)="closeSettingsModal()"
    (detectionModeChanged)="updateDetectionMode($event)"
    (globalIgnoreListChanged)="updateGlobalIgnoreList($event)"
    (groupPreferenceChanged)="toggleGroupEnabled($event)"
    (helpRequested)="openHelp('controls')"
    (keywordBlocklistChanged)="updateKeywordBlocklist($event)"
    (maskingStrategyChanged)="updateMaskingStrategy($event)"
    (xmlWrapEnabledChanged)="updateXmlWrapEnabled($event)"
    (xmlWrapTagChanged)="updateXmlWrapTag($event)"
    (polyglotEnabledChanged)="updatePolyglotEnabled($event)"
    (polyglotFamiliesChanged)="updatePolyglotFamilies($event)"
    (polyglotExcludedSubtypesChanged)="updatePolyglotExcludedSubtypes($event)"
  ></app-masking-settings-modal>

  <app-help-modal
    [topic]="activeHelpTopic()"
    (closed)="closeHelp()"
  ></app-help-modal>
  <app-toast-stack
    [toasts]="toasts()"
    (dismissed)="dismissToast($event)"
  ></app-toast-stack>
</div>
