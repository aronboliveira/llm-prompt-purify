# develop-ts: API is handled by Netlify serverless functions.
# Use `netlify dev` locally to serve both the Angular app and functions together.
# This compose file is retained for spinning up only the frontend container
# when you need a production-like nginx build without the Netlify CLI.
services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "44200:80"
