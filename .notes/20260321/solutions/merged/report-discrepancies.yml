# Report Discrepancies: Copilot vs Gemini vs Verified Reality
# Generated by merged analysis — see 01-report-validation.md for prose

format_version: 1

corpus_metadata:
  total_files: 9772
  total_leaked_files: 2406
  total_leak_values: 7352
  locales: ["en", "es", "pt-br", "zh"]
  strategies: ["global-only", "selected-plus-global"]

# ---------------------------------------------------------------
# Each entry:  topic → copilot claim, gemini claim, verified truth
# ---------------------------------------------------------------

discrepancies:
  - id: D01
    topic: "Brazilian CPF count"
    copilot_claim: "2,244 Brazilian CPFs leaked"
    gemini_claim: "Did not independently re-count; echoed copilot data"
    verified: >
      1,200 real CPF values (58 formatted + 1,142 unformatted).
      The inflated 2,244 includes 470 Chinese IDs and 574 IBANs
      misclassified by the categorizeLeak function's unanchored
      CPF regex matching subsequences of longer values.
    verdict: copilot_overcounted
    action: "Fix categorizeLeak anchoring (04-test-fixes.md §Fix 5)"

  - id: D02
    topic: "CURP/IBAN misclassification count"
    copilot_claim: "574 CURPs misclassified as IBANs"
    gemini_claim: "574 CURPs conflated with IBANs"
    verified: >
      Both reports are wrong. Only 22 CURPs match the categorizer's
      IBAN regex (via the DF+2-digit pattern at offset 2). The 574
      values categorized under IBAN-related buckets are real mock
      IBANs (like GB89BANK..., ES176...) with invalid mod-97 checksums.
      These 574 IBANs were actually categorized as "Brazilian CPFs"
      (not IBANs) due to the CPF regex running first.
    verdict: both_wrong
    action: "Fix categorizeLeak ordering + add IBAN checksum to extractor"

  - id: D03
    topic: "RFC misclassification"
    copilot_claim: "Not identified — RFCs lumped into Credit Cards"
    gemini_claim: "Not independently identified"
    verified: >
      22 RFC values (e.g., ROMC8505126A3) don't match any specific
      regex in categorizeLeak and fall to the default "Credit Cards /
      Other Financial" category. Both reports missed this entirely.
    verdict: both_missed
    action: "Add RFC category to categorizeLeak (04-test-fixes.md §Fix 5)"

  - id: D04
    topic: "Chinese ID treatment"
    copilot_claim: "470 Chinese IDs leaked under non-cn scopes"
    gemini_claim: "Missing standalone cn-resident-id rule"
    verified: >
      Both partially correct. 470 Chinese IDs leak because there is
      no standalone (unlabeled) cn-resident-id rule — only labeled/JSON
      variants exist. Copilot correctly counted 470 but miscategorized
      them as CPFs. Gemini correctly identified the missing rule but
      did not verify the count.
    verdict: both_partially_correct
    action: "Add standalone cn-resident-id rule (03-engine-fixes.md §Fix 2)"

  - id: D05
    topic: "CUIT/RUT substring inflation"
    copilot_claim: "Noted CUIT and RUT overlap but no dedup fix proposed"
    gemini_claim: "Identified CUIT body matching RUT; proposed substring dedup"
    verified: >
      1,912 CUIT values under es|cl scopes produce inner 8+1 digits
      that exactly match 1,912 rut-dashed values. Pure 1:1 inflation.
      Gemini's substring de-duplication proposal is correct. Additional
      474 pt-br|br RUT-formatted values are Brazilian RGs (not RUTs)
      that survive because no RUT checksum validation exists.
    verdict: gemini_more_accurate
    action: >
      Substring dedup (04-test-fixes.md §Fix 1) +
      RUT checksum (04-test-fixes.md §Fix 2)

  - id: D06
    topic: "SSN treatment"
    copilot_claim: "80 SSNs leaked; move SSN to global"
    gemini_claim: "SSN country-scoped; leaks under non-US scopes expected"
    verified: >
      80 SSN leaks: all under non-US scopes. All 4 SSN rules have
      coverage: "country", countryProfileIds: ["us"]. Both reports
      correctly identified this. Copilot's fix (promote to global)
      is reasonable since the 3-2-4 format is distinctive and
      isValidUsaSsn already validates area/group codes.
    verdict: both_correct
    action: "Promote SSN rules to global (03-engine-fixes.md §Fix 1)"

  - id: D07
    topic: "Phase ordering"
    copilot_claim: "Engine fixes first → test fixes after"
    gemini_claim: "Test fixes first → engine fixes after"
    verified: >
      Gemini's ordering is correct. Test fixes (Phase 0) have zero
      risk to production and immediately eliminate 3,236 false reports.
      Engine fixes (Phase 1-2) require more careful validation.
      Fixing tests first also gives accurate baseline numbers for
      measuring engine fix impact.
    verdict: gemini_preferred
    action: "Phase 0 = test fixes, Phase 1 = engine, Phase 2 = scope expansion"

  - id: D08
    topic: "latam-es expansion"
    copilot_claim: >
      Proposed expandCountryScope function mapping
      latam-es → [mx, ar, cl, co, pe, ...]
    gemini_claim: "Regional auto-expansion with opt-out"
    verified: >
      Both propose essentially the same solution. No expandCountryScope
      function currently exists. 16 rules use "latam-es" in
      countryProfileIds. Making it auto-expand when any member country
      is selected would immediately activate CURP/RFC/CUIT under
      latam-es sibling scopes.
    verdict: both_aligned
    action: "Implement in Phase 2 (05-implementation-roadmap.md)"

  - id: D09
    topic: "Mock data quality — IBAN checksums"
    copilot_claim: "Not specifically addressed"
    gemini_claim: "Mock IBAN generator produces invalid checksums"
    verified: >
      574 mock IBANs (e.g., GB89BANK95431514479519) fail mod-97
      validation. The engine's isLikelyIban validator correctly
      rejects them, so they're NOT engine leaks. They're extractor
      false positives — the test extractor has no IBAN checksum.
    verdict: gemini_correct
    action: "Add IBAN checksum to extractor (04-test-fixes.md §Fix 4)"

  - id: D10
    topic: "Bearer token false positives"
    copilot_claim: "4 bearer leaks noted in raw data"
    gemini_claim: "Not specifically addressed"
    verified: >
      4 values are literal 'Bearer token' text (the word 'token'
      after 'Bearer '). Real tokens are 20+ chars. Test extractor
      regex has no minimum length after 'Bearer '.
    verdict: copilot_noted
    action: "Bearer min-length 20 (04-test-fixes.md §Fix 3)"

  - id: D11
    topic: "Total genuine engine gaps"
    copilot_claim: "2,406 files show vulnerabilities"
    gemini_claim: "Significant portion is cross-scope by design"
    verified: >
      Of 7,352 leak values, only 470 (6.4%) are genuine engine gaps
      (missing standalone cn-resident-id). 3,408 (46.3%) are cross-scope
      by design. 3,236 (44.0%) are test artifacts. 238 remain after
      all fixes if scope expansion is implemented.
    verdict: gemini_more_nuanced
    action: "See root cause breakdown in 02-root-cause-analysis.md"

