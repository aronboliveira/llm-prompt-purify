version: 1
scope:
  app_root: src/app
  notes_root: .notes/.llms
rules:
  domain_layers:
    - core
    - features
    - shared
  folder_contract:
    declarations:
      purpose: reusable interfaces, types, DTO-like contracts, and discriminated unions
      suffixes:
        - ".types.ts"
        - ".contracts.ts"
    constants:
      purpose: repeated strings, labels, rule catalogs, storage keys, configs, SVG constants
      suffixes:
        - ".constants.ts"
    utils:
      purpose: pure helpers, validators, serializers, timers, storage helpers, formatting helpers
      suffixes:
        - ".utils.ts"
  class_contract:
    main_classes:
      - keep public API explicit
      - prefer one responsibility per class
      - delegate stateless work into utils
      - avoid embedding long readonly dictionaries in classes
  ui_contract:
    shell:
      must_render:
        - input textarea
        - protected output block
        - group policy panel
        - per-match review menu
        - toasts
        - help modal
    feedback:
      required_actions:
        - scan
        - copy
        - regenerate
        - group toggle
        - failure states
  dry:
    ban:
      - duplicate storage key strings
      - duplicate help paragraphs
      - duplicate workflow labels
      - duplicate rule labels
