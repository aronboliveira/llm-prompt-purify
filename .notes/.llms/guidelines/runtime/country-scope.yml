country_scope:
  selection_model: multi_select
  default_source: browser_locale
  fallback_profile_ids:
    - br
  allow_global_only: true
  warn_on_mixed_language_families: true
  priority_order:
    - br
    - pt
    - es
    - latam-es
    - us
    - mx
    - ar
    - cl
    - co
    - pe
    - cn
    - ru
    - in
  supported_profiles:
    - id: br
      locale_label: PT-BR
      language_family: portuguese
    - id: pt
      locale_label: PT-PT
      language_family: portuguese
    - id: es
      locale_label: ES-ES
      language_family: spanish
    - id: latam-es
      locale_label: ES-LatAm
      language_family: spanish
    - id: us
      locale_label: EN-US
      language_family: english
    - id: cn
      locale_label: ZH-CN
      language_family: mandarin
    - id: ru
      locale_label: RU-RU
      language_family: russian
    - id: in
      locale_label: EN-IN
      language_family: indic
