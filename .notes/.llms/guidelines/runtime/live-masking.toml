[workspace]
mode = "translator"
copy_target = "masked_output_only"
processing = "client_side"
requires_output_block = true
requires_spinner = true

[workspace.scope]
mode = "multi_country"
global_only_toggle = true
mixed_language_warning = true

[workspace.controls]
group_toggles = true
per_match_toggles = true
per_match_regeneration = true
inline_callbacks_update_output = true

[workspace.feedback]
toast_events = ["copy", "scope_change", "settings_change", "group_toggle", "regenerate"]
status_snippets = true
help_modals = true
