version = "1"
project = "llm-prompt-purify"

[execution]
commit_mode = "granular"
volatile_dir = ".tmp"
durable_dir = ".notes"
primary_style_guide = ".notes/.llms/coding-style.xml"

[refactor]
strategy = "replace-fragile-flow"
ui_goal = "paste-scan-copy"
mask_default = true
allow_toggle_disable = true
modal_dependency = "avoid"

[quality]
unit_runner = "jest"
e2e_runner = "playwright"
fixture_focus = ["pt-BR", "es-LatAm", "en-US"]
required_checks = ["unit", "e2e", "build"]

[logging]
decision_log = ".notes/.llms/logs/refactor-log.md"
verification_log = ".tmp/project-overhaul/verification.log"
style_log = ".notes/.llms/logs/style-usage.md"
