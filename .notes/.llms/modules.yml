version: 1
project: llm-prompt-purify
primary_objective: >
  Refactor the Angular app into a low-friction client-side prompt sanitizer
  that masks sensitive data by default and lets the user disable individual masks.
modules:
  - id: app_shell
    layer: feature-shell
    owner: app-shell
    paths:
      - src/app
    outcome:
      - minimal scan workflow
      - accessible result review
      - honest routes and actions
  - id: masking_engine
    layer: core-domain
    owner: masking-engine
    paths:
      - src/app/core
      - src/app/features/scanner
    outcome:
      - deterministic detection
      - stable mask generation
      - recomposable output
  - id: state_storage
    layer: core-state
    owner: state-and-storage
    paths:
      - src/app/core/state
      - src/app/core/storage
    outcome:
      - safe session persistence
      - schema-based storage
  - id: testing
    layer: quality
    owner: testing
    paths:
      - src/**/*.spec.ts
      - e2e
    outcome:
      - extensive rule fixtures
      - critical user-flow coverage
  - id: extension
    layer: delivery-surface
    owner: extension
    paths:
      - chromium-extension
      - _extension.js
    outcome:
      - aligned rule set
      - matching branding
      - reduced duplication
priority_order:
  - masking_engine
  - app_shell
  - state_storage
  - testing
  - extension
