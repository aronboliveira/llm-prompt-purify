# Nginx Ingress — TLS termination, path-based routing
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-prompt-purify
  namespace: llm-prompt-purify
  labels:
    app.kubernetes.io/part-of: llm-prompt-purify
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Uncomment for cert-manager automatic TLS:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - llmpromptpurify.example.com      # ← replace with real domain
      secretName: llmpromptpurify-tls
  rules:
    - host: llmpromptpurify.example.com    # ← replace with real domain
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
