# Frontend deployment — nginx serving Angular SSR build
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: llm-prompt-purify
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: llm-prompt-purify
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          # ${ACR_REGISTRY}/${ACR_FRONTEND_IMAGE}:${IMAGE_TAG} — replaced by CI
          image: llmpromptpurify.azurecr.io/llmpromptpurify/frontend:${IMAGE_TAG}
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
