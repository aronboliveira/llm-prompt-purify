# Mongo secrets — in production, use Azure Key Vault CSI driver or sealed-secrets.
# These base64 values are PLACEHOLDERS for local/dev only.
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: llm-prompt-purify
type: Opaque
data:
  # echo -n 'admin' | base64
  MONGO_INITDB_ROOT_USERNAME: YWRtaW4=
  # echo -n '<replace-with-real-password>' | base64
  MONGO_INITDB_ROOT_PASSWORD: cGFzc3dvcmQ=
---
# SMTP / developer email — inject via sealed-secrets or external-secrets in prod
apiVersion: v1
kind: Secret
metadata:
  name: email-credentials
  namespace: llm-prompt-purify
type: Opaque
data:
  SMTP_HOST: c210cC5nbWFpbC5jb20=
  SMTP_PORT: NTg3
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_SENDER_EMAIL: ""
